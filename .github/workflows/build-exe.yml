# ═══════════════════════════════════════════════════════════════
#  KashiKart — Build Windows .exe (Electron)
#  Trigger: push tag v*.*.* OR manual dispatch
# ═══════════════════════════════════════════════════════════════
name: Build Windows .exe

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: kashikart-tender-data

jobs:
  build-exe:
    runs-on: windows-latest
    name: Build Windows Installer
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${{ github.ref_name }}"
          fi
          SEMVER="${V#v}"
          echo "tag=$V" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT

      - name: Stamp version
        working-directory: frontend
        run: npm version ${{ steps.version.outputs.semver }} --no-git-tag-version --allow-same-version

      - name: Write .env.production
        working-directory: frontend
        shell: bash
        run: echo "VITE_API_BASE_URL=http://13.232.38.191:8000" > .env.production

      - name: Build React app (Vite)
        working-directory: frontend
        run: npm run build

      - name: Build Windows installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # --publish never: we handle release separately below
        run: npx electron-builder --win --x64 --publish never

      - name: List output
        shell: bash
        run: ls -lh frontend/dist-electron/ || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KashiKart-Windows-${{ steps.version.outputs.tag }}
          path: frontend/dist-electron/*.exe
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload .exe to S3
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          aws s3 sync frontend/dist-electron/ \
            s3://${{ env.S3_BUCKET }}/exe/$VERSION/ \
            --exclude "*" --include "*.exe"
          aws s3 sync frontend/dist-electron/ \
            s3://${{ env.S3_BUCKET }}/exe/latest/ \
            --exclude "*" --include "*.exe" --delete
          echo "Uploaded to s3://${{ env.S3_BUCKET }}/exe/$VERSION/"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KashiKart ${{ steps.version.outputs.tag }}
          files: frontend/dist-electron/*.exe
          generate_release_notes: true
          body: |
            ## KashiKart Tender Intelligence ${{ steps.version.outputs.tag }}

            ### Install on Windows
            1. Download the `.exe` from assets below
            2. Run installer → follow wizard
            3. Launch from Desktop shortcut

            **Backend:** http://13.232.38.191:8000
            **Requirements:** Windows 10/11 64-bit · Internet connection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: success()
        shell: bash
        run: |
          echo "## Windows .exe Built" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3:** s3://${{ env.S3_BUCKET }}/exe/${{ steps.version.outputs.tag }}/" >> $GITHUB_STEP_SUMMARY
