# ═══════════════════════════════════════════════════════════════
#  KashiKart — Build Windows .exe (Electron)
#  Triggers: push a version tag like v1.0.0  OR  run manually
#  Output  : KashiKart-Setup-x.x.x.exe uploaded to:
#            - GitHub Release assets
#            - S3: kashikart-tender-data/exe/latest/
# ═══════════════════════════════════════════════════════════════

name: Build Windows .exe

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: kashikart-tender-data

jobs:
  build-exe:
    runs-on: windows-latest
    name: Build & Package Windows Installer

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ─────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── Resolve version ──────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${{ github.ref_name }}"
          fi
          # Strip leading 'v' for npm version field
          SEMVER="${V#v}"
          echo "tag=$V" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "Building version: $V ($SEMVER)"

      # ── Stamp version into package.json ──────────────────────
      - name: Set version in package.json
        working-directory: frontend
        run: npm version ${{ steps.version.outputs.semver }} --no-git-tag-version --allow-same-version

      # ── Write .env.production so Vite bakes in the EC2 URL ──
      - name: Write .env.production
        working-directory: frontend
        run: |
          echo "VITE_API_BASE_URL=http://13.232.38.191:8000" > .env.production

      # ── Build React app (Vite) ───────────────────────────────
      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      # ── Build Windows installer (Electron Builder) ───────────
      - name: Build Windows .exe
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code-signing (add cert secrets later if needed)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --x64

      # ── List artifacts ───────────────────────────────────────
      - name: List built installer files
        shell: bash
        run: |
          echo "--- dist-electron contents ---"
          ls -lh frontend/dist-electron/ || true

      # ── Upload to GitHub Actions artifacts ───────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KashiKart-Windows-Installer-${{ steps.version.outputs.tag }}
          path: frontend/dist-electron/*.exe
          retention-days: 30

      # ── Upload to S3 ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload .exe to S3
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Upload to versioned path
          aws s3 sync frontend/dist-electron/ \
            s3://${{ env.S3_BUCKET }}/exe/$VERSION/ \
            --exclude "*" --include "*.exe" \
            --region ${{ env.AWS_REGION }}

          # Also update /latest/
          aws s3 sync frontend/dist-electron/ \
            s3://${{ env.S3_BUCKET }}/exe/latest/ \
            --exclude "*" --include "*.exe" \
            --delete \
            --region ${{ env.AWS_REGION }}

          echo "Uploaded to s3://${{ env.S3_BUCKET }}/exe/$VERSION/"
          echo "Also updated s3://${{ env.S3_BUCKET }}/exe/latest/"

      # ── Create GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KashiKart Tender Intelligence ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: frontend/dist-electron/*.exe
          body: |
            ## KashiKart Tender Intelligence ${{ steps.version.outputs.tag }}

            ### How to install on Windows
            1. Download **KashiKart-Setup-${{ steps.version.outputs.semver }}.exe** from the assets below
            2. Double-click to run the installer
            3. Follow the setup wizard (choose install folder)
            4. Launch from Desktop shortcut or Start Menu

            ### What this app connects to
            - **Backend API:** http://13.232.38.191:8000
            - **S3 Bucket:** kashikart-tender-data (ap-south-1)

            ### System Requirements
            - Windows 10 / 11 (64-bit)
            - 4 GB RAM minimum
            - 500 MB free disk space
            - Internet connection required
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ──────────────────────────────────────────────
      - name: Build summary
        if: success()
        shell: bash
        run: |
          echo "## Windows .exe Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 path:** s3://${{ env.S3_BUCKET }}/exe/${{ steps.version.outputs.tag }}/" >> $GITHUB_STEP_SUMMARY
          echo "**S3 latest:** s3://${{ env.S3_BUCKET }}/exe/latest/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the installer from the Release assets or from S3." >> $GITHUB_STEP_SUMMARY
