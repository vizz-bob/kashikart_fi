# ═══════════════════════════════════════════════════════════════
#  KashiKart — Deploy Backend to EC2
#  EC2 IP  : 13.232.38.191
#  S3      : kashikart-tender-data
#  Region  : ap-south-1 (Mumbai)
#  No domain — all traffic via IP
# ═══════════════════════════════════════════════════════════════

name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  EC2_HOST: 13.232.38.191
  EC2_USER: ubuntu
  AWS_REGION: ap-south-1
  DEPLOY_PATH: /home/ubuntu/kashikart

jobs:
  # ── 1. Quick syntax / import check ────────────────────────────
  lint:
    runs-on: ubuntu-latest
    name: Lint & Syntax Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile app/main.py || true
          echo "Syntax check complete"

  # ── 2. Deploy backend to EC2 via SSH ──────────────────────────
  deploy:
    needs: lint
    runs-on: ubuntu-latest
    name: Deploy to EC2 (13.232.38.191)

    steps:
      - uses: actions/checkout@v4

      # Write the PEM key from GitHub Secret
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > kashikart.pem
          chmod 400 kashikart.pem

      # Push code to EC2
      - name: Sync code to EC2
        run: |
          ssh -i kashikart.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "mkdir -p ${{ env.DEPLOY_PATH }}"

          rsync -az --delete \
            -e "ssh -i kashikart.pem -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/dist-electron' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            . ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/

      # Write .env on the EC2 instance from GitHub Secrets
      - name: Write .env on EC2
        run: |
          ssh -i kashikart.pem \
              -o StrictHostKeyChecking=no \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          cat > ${{ env.DEPLOY_PATH }}/.env << EOF
          # Auto-generated by GitHub Actions — do not edit manually
          APP_NAME=KashiKart
          APP_VERSION=1.0.0
          ENVIRONMENT=production

          DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ secrets.DB_NAME }}
          DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }}

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30

          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=ap-south-1
          S3_BUCKET_NAME=kashikart-tender-data

          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_TLS=true
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}

          FRONTEND_URL=http://13.232.38.191
          BACKEND_URL=http://13.232.38.191:8000

          UPLOAD_DIR=${{ env.DEPLOY_PATH }}/uploads
          BRANDING_UPLOAD_DIR=${{ env.DEPLOY_PATH }}/branding
          EOF
          ENDSSH

      # Install Python deps & restart systemd service
      - name: Install deps & restart service
        run: |
          ssh -i kashikart.pem \
              -o StrictHostKeyChecking=no \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          set -e
          cd ${{ env.DEPLOY_PATH }}/backend

          # Ensure Python 3.11 venv exists
          if [ ! -d "/home/ubuntu/venv" ]; then
            python3.11 -m venv /home/ubuntu/venv
          fi

          source /home/ubuntu/venv/bin/activate

          # Install / update dependencies
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

          # Create upload dirs if missing
          mkdir -p ${{ env.DEPLOY_PATH }}/uploads
          mkdir -p ${{ env.DEPLOY_PATH }}/branding

          # Reload and restart the systemd service
          sudo systemctl daemon-reload
          sudo systemctl restart kashikart-backend
          sudo systemctl enable kashikart-backend

          echo "Service restarted"
          ENDSSH

      # Health check — wait up to 60s for API to respond
      - name: Health check
        run: |
          echo "Waiting for backend to come up..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ env.EC2_HOST }}:8000/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1

      # Cleanup local PEM
      - name: Cleanup
        if: always()
        run: rm -f kashikart.pem

      # Summary
      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "**EC2:** http://${{ env.EC2_HOST }}:8000" >> $GITHUB_STEP_SUMMARY
          echo "**API Docs:** http://${{ env.EC2_HOST }}:8000/docs" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** kashikart-tender-data" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
