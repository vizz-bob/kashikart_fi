name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run backend tests
      run: |
        cd backend
        python -m pytest tests/ -v || echo "No tests found, skipping..."

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        npm run test || echo "No tests found, skipping..."

    - name: Build frontend
      run: |
        cd frontend
        npm run build

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Build and Deploy to EC2
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create SSH key file
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" > ec2-key.pem
        chmod 400 ec2-key.pem

    - name: Wait for EC2 instance
      run: |
        aws ec2 wait instance-status-ok --instance-ids ${{ env.EC2_INSTANCE_ID }}

    - name: Get EC2 public IP
      id: ec2-info
      run: |
        PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ env.EC2_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
        echo "EC2 Public IP: $PUBLIC_IP"

    - name: Deploy to EC2
      env:
        EC2_PUBLIC_IP: ${{ steps.ec2-info.outputs.public_ip }}
        DEPLOY_ENV: ${{ github.event.inputs.environment || 'staging' }}
      run: |
        # Create deployment script
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "🚀 Starting deployment to EC2..."
        
        # Variables
        REPO_URL="vizz-bob/kashikart_fi"
        BRANCH="${{ github.ref_name }}"
        DEPLOY_PATH="/home/ubuntu/kashikart_fi"
        
        # Update system packages
        sudo apt update && sudo apt upgrade -y
        
        # Install Docker if not present
        if ! command -v docker &> /dev/null; then
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker ubuntu
        fi
        
        # Install Docker Compose if not present
        if ! command -v docker-compose &> /dev/null; then
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        
        # Clone or update repository
        if [ -d "$DEPLOY_PATH" ]; then
          cd $DEPLOY_PATH
          git fetch origin
          git pull origin $BRANCH
        else
          git clone https://github.com/$REPO_URL.git $DEPLOY_PATH
          cd $DEPLOY_PATH
          git checkout $BRANCH
        fi
        
        # Create environment file
        cat > .env << EOFILE
        DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ secrets.DB_NAME }}
        DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }}
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
        AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION=${{ env.AWS_REGION }}
        S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
        SMTP_USER=${{ secrets.SMTP_USER }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
        ENVIRONMENT=production
        FRONTEND_URL=https://${{ env.DOMAIN_NAME }}
        BACKEND_URL=https://${{ env.DOMAIN_NAME }}:8000
        EOFILE
        
        # Deploy with Docker Compose
        cd $DEPLOY_PATH
        docker-compose down
        docker-compose build --no-cache
        docker-compose up -d
        
        # Wait for services to be healthy
        echo "⏳ Waiting for services to start..."
        sleep 30
        
        # Check service health
        if curl -f http://localhost:8000/api/health; then
          echo "✅ Backend is healthy"
        else
          echo "❌ Backend health check failed"
          docker-compose logs backend
          exit 1
        fi
        
        if curl -f http://localhost; then
          echo "✅ Frontend is healthy"
        else
          echo "❌ Frontend health check failed"
          docker-compose logs frontend
          exit 1
        fi
        
        echo "✅ Deployment completed successfully!"
        EOF
        
        # Make script executable and run it
        chmod +x deploy.sh
        
        # Copy and execute on EC2
        scp -i ec2-key.pem -o StrictHostKeyChecking=no deploy.sh ubuntu@${EC2_PUBLIC_IP}:/tmp/
        ssh -i ec2-key.pem -o StrictHostKeyChecking=no ubuntu@${EC2_PUBLIC_IP} "chmod +x /tmp/deploy.sh && /tmp/deploy.sh"

    - name: Setup SSL Certificate
      env:
        EC2_PUBLIC_IP: ${{ steps.ec2-info.outputs.public_ip }}
      run: |
        cat > setup-ssl.sh << 'EOF'
        #!/bin/bash
        set -e
        
        DOMAIN="${{ env.DOMAIN_NAME }}"
        EMAIL="admin@${DOMAIN}"
        
        echo "🔒 Setting up SSL certificate for $DOMAIN"
        
        # Install Certbot
        sudo apt update
        sudo apt install -y certbot python3-certbot-nginx
        
        # Update Nginx configuration
        sudo sed -i "s/your-domain.com/$DOMAIN/g" /etc/nginx/sites-available/kashikart
        
        # Test Nginx config
        sudo nginx -t
        sudo systemctl reload nginx
        
        # Obtain SSL certificate
        sudo certbot --nginx -d "$DOMAIN" -d "www.$DOMAIN" --non-interactive --agree-tos --email "$EMAIL"
        
        # Setup auto-renewal
        (crontab -l 2>/dev/null; echo "0 12 * * * /usr/bin/certbot renew --quiet --post-hook 'systemctl reload nginx'") | crontab -
        
        echo "✅ SSL setup completed!"
        EOF
        
        # Execute SSL setup
        chmod +x setup-ssl.sh
        scp -i ec2-key.pem -o StrictHostKeyChecking=no setup-ssl.sh ubuntu@${EC2_PUBLIC_IP}:/tmp/
        ssh -i ec2-key.pem -o StrictHostKeyChecking=no ubuntu@${EC2_PUBLIC_IP} "chmod +x /tmp/setup-ssl.sh && sudo /tmp/setup-ssl.sh"

    - name: Build Windows .exe
      run: |
        cd frontend
        
        # Install Electron dependencies
        npm install --save-dev electron electron-builder concurrently wait-on
        
        # Update package.json for Electron
        npm pkg set main="public/electron.js"
        npm pkg set homepage="."
        npm pkg set scripts.electron="electron ."
        npm pkg set scripts.electron-dev="concurrently \"npm run dev\" \"wait-on http://localhost:5173 && electron .\""
        npm pkg set scripts.electron-pack="electron-builder"
        npm pkg set scripts.preelectron-pack="npm run build"
        
        # Add electron-builder configuration
        npm pkg set build.appId="com.kashikart.tender"
        npm pkg set build.productName="KashiKart Tender Intelligence"
        npm pkg set build.directories.output="dist-electron"
        npm pkg set build.files[0]="dist/**/*"
        npm pkg set build.files[1]="node_modules/**/*"
        npm pkg set build.files[2]="public/electron.js"
        npm pkg set build.win.target="nsis"
        npm pkg set build.win.icon="public/icon.ico"
        npm pkg set build.nsis.oneClick=false
        npm pkg set build.nsis.allowToChangeInstallationDirectory=true
        npm pkg set build.nsis.createDesktopShortcut=true
        npm pkg set build.nsis.createStartMenuShortcut=true
        
        # Build the executable
        npm run electron-pack
        
        # Upload .exe to S3
        if [ -d "dist-electron" ]; then
          aws s3 sync dist-electron/ s3://${{ secrets.S3_BUCKET_NAME }}/exe/ --delete
          echo "✅ Windows .exe uploaded to S3"
        fi

    - name: Run health checks
      env:
        EC2_PUBLIC_IP: ${{ steps.ec2-info.outputs.public_ip }}
      run: |
        # Wait a bit for services to fully start
        sleep 60
        
        # Check backend health
        BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN_NAME }}/api/health)
        if [ "$BACKEND_STATUS" = "200" ]; then
          echo "✅ Backend health check passed"
        else
          echo "❌ Backend health check failed (HTTP $BACKEND_STATUS)"
          exit 1
        fi
        
        # Check frontend health
        FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN_NAME }})
        if [ "$FRONTEND_STATUS" = "200" ]; then
          echo "✅ Frontend health check passed"
        else
          echo "❌ Frontend health check failed (HTTP $FRONTEND_STATUS)"
          exit 1
        fi

    - name: Create deployment summary
      run: |
        echo "## 🎉 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Successfully Deployed to AWS EC2" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Application URL:** https://${{ env.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "**API Documentation:** https://${{ env.DOMAIN_NAME }}/docs" >> $GITHUB_STEP_SUMMARY
        echo "**Windows .exe:** Available in S3 bucket \`${{ secrets.S3_BUCKET_NAME }}/exe/\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Deployment Details" >> $GITHUB_STEP_SUMMARY
        echo "- **EC2 Instance:** ${{ env.EC2_INSTANCE_ID }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
        echo "- [🌐 Live Application](https://${{ env.DOMAIN_NAME }})" >> $GITHUB_STEP_SUMMARY
        echo "- [📚 API Docs](https://${{ env.DOMAIN_NAME }}/docs)" >> $GITHUB_STEP_SUMMARY
        echo "- [📁 S3 Bucket](https://s3.console.aws.amazon.com/s3/buckets/${{ secrets.S3_BUCKET_NAME }})" >> $GITHUB_STEP_SUMMARY

    - name: Notify on success
      if: success()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="✅ KashiKart deployment completed successfully! 🎉\n\n🌐 https://${{ env.DOMAIN_NAME }}\n📚 https://${{ env.DOMAIN_NAME }}/docs" \
          2>/dev/null || echo "Telegram notification failed"

    - name: Notify on failure
      if: failure()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ KashiKart deployment failed! 🚨\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}" \
          2>/dev/null || echo "Telegram notification failed"

  cleanup:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Cleanup temporary files
      run: |
        rm -f ec2-key.pem
        rm -f deploy.sh
        rm -f setup-ssl.sh
