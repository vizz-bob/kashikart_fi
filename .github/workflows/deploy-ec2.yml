# ═══════════════════════════════════════════════════════════════
#  KashiKart — Deploy Backend to EC2
#  EC2 IP : 13.232.38.191  |  Region: ap-south-1
# ═══════════════════════════════════════════════════════════════
name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  EC2_HOST: 13.232.38.191
  EC2_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/kashikart

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to EC2

    steps:
      - uses: actions/checkout@v4

      # ── SSH setup (base64-encoded key) ───────────────────────
      - name: Setup SSH
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$EC2_SSH_KEY_B64" | base64 -di > ~/.ssh/id_rsa || echo "$EC2_SSH_KEY_B64" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519,rsa -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null && echo "SSH key valid"

      # ── Sync code ────────────────────────────────────────────
      - name: Sync code to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/dist-electron' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            . ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/

      # ── Write .env from secrets ───────────────────────────────
      - name: Write .env on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "cat > ${{ env.DEPLOY_PATH }}/.env << 'ENVEOF'
          APP_NAME=KashiKart
          APP_VERSION=1.0.0
          ENVIRONMENT=production
          DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ secrets.DB_NAME }}
          DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=ap-south-1
          S3_BUCKET_NAME=kashikart-tender-data
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_TLS=true
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          FRONTEND_URL=http://13.232.38.191
          BACKEND_URL=http://13.232.38.191:8000
          UPLOAD_DIR=${{ env.DEPLOY_PATH }}/uploads
          BRANDING_UPLOAD_DIR=${{ env.DEPLOY_PATH }}/branding
          ENVEOF"

      # ── Install deps & restart service ────────────────────────
      - name: Restart backend
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOST }} '
            set -e
            source /home/ubuntu/venv/bin/activate
            pip install -r /home/ubuntu/kashikart/backend/requirements.txt -q
            mkdir -p /home/ubuntu/kashikart/uploads /home/ubuntu/kashikart/branding
            sudo systemctl daemon-reload
            sudo systemctl restart kashikart-backend
            sudo systemctl enable kashikart-backend
            echo "Service restarted OK"
          '

      # ── Health check ─────────────────────────────────────────
      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.EC2_HOST }}:8000/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Summary
        if: success()
        run: |
          echo "## Deployed to EC2" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ env.EC2_HOST }}:8000" >> $GITHUB_STEP_SUMMARY
          echo "**Docs:** http://${{ env.EC2_HOST }}:8000/docs" >> $GITHUB_STEP_SUMMARY
