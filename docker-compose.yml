version: '3.9'

# ═══════════════════════════════════════════════
#  KashiKart — Docker Compose (Production)
# ═══════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: kashikart_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - kashikart_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # React + Vite Frontend (Served via Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: kashikart_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kashikart_network

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  kashikart_network:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  backend_logs:
    driver: local
